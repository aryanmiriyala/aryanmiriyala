name: Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          committer_token: ${{ github.token }}
          user: aryanmiriyala
          filename: github-metrics.svg
          template: classic
          base: header

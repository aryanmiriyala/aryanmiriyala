name: Recent Activity

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recent-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh recent activity
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: aryanmiriyala
        run: node scripts/update-recent-activity.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md generated/recent-activity.md
          git diff --cached --quiet || git commit -m "Refresh recent activity"
          git push
